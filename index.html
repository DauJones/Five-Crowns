<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Five Crowns</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app"></div>

  <script>
    const STORAGE_KEY = 'fiveCrowns';
    const ROUNDS = [
      { round: 1,  cards: 3,  wild: '3s'     },
      { round: 2,  cards: 4,  wild: '4s'     },
      { round: 3,  cards: 5,  wild: '5s'     },
      { round: 4,  cards: 6,  wild: '6s'     },
      { round: 5,  cards: 7,  wild: '7s'     },
      { round: 6,  cards: 8,  wild: '8s'     },
      { round: 7,  cards: 9,  wild: '9s'     },
      { round: 8,  cards: 10, wild: '10s'    },
      { round: 9,  cards: 11, wild: 'Jacks'  },
      { round: 10, cards: 12, wild: 'Queens' },
      { round: 11, cards: 13, wild: 'Kings'  },
    ];

    let pendingError = null;

    // ── Storage ──────────────────────────────────────────────────────────────

    function readGame() {
      try {
        const data = localStorage.getItem(STORAGE_KEY);
        return data ? JSON.parse(data) : null;
      } catch {
        return null;
      }
    }

    function writeGame(data) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    // ── Game logic ───────────────────────────────────────────────────────────

    function computeTotals(scores, players) {
      const totals = {};
      for (const p of players) {
        totals[p] = (scores[p] || []).reduce((sum, v) => sum + v, 0);
      }
      return totals;
    }

    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ── HTML builders ────────────────────────────────────────────────────────

    function buildScoreTable(game) {
      const { players, scores, currentRound } = game;
      const completedRounds = currentRound - 1;
      const totals = computeTotals(scores, players);
      const minTotal = Math.min(...players.map(p => totals[p]));

      const headerCols = players.map(p => `<th class="th-player">${esc(p)}</th>`).join('');
      const thead = `<thead><tr><th class="th-meta">Round</th><th class="th-meta">Cards</th><th class="th-meta">Wild</th>${headerCols}</tr></thead>`;

      let rows = '';
      for (let i = 0; i < completedRounds; i++) {
        const r = ROUNDS[i];
        const cols = players.map(p => `<td>${scores[p][i]}</td>`).join('');
        rows += `<tr><td>${r.round}</td><td>${r.cards}</td><td>${r.wild}</td>${cols}</tr>`;
      }

      const totalCols = players.map(p => {
        const cls = totals[p] === minTotal && completedRounds > 0 ? ' class="leading"' : '';
        return `<td${cls}>${totals[p]}</td>`;
      }).join('');
      const totalsRow = `<tr class="totals-row"><td colspan="3">Total</td>${totalCols}</tr>`;
      const tbody = `<tbody>${rows}${totalsRow}</tbody>`;

      return `<div class="table-wrapper" id="score-table-wrapper"><table>${thead}${tbody}</table></div><button class="btn-pill" id="totals-toggle">Hide totals</button>`;
    }

    function renderSetup(error) {
      const errorHtml = error ? `<p class="error">${esc(error)}</p>` : '';
      const inputs = Array.from({ length: 7 }, (_, i) => {
        const n = i + 1;
        const req = n <= 2 ? ' required' : '';
        return `<input type="text" name="p${n}" placeholder="Player ${n}"${req} maxlength="20">`;
      }).join('\n        ');

      return `
        <h1>Five Crowns</h1>
        <div class="setup-form">
          <h2>New Game</h2>
          ${errorHtml}
          <form id="start-form">
            <div class="name-inputs">
              ${inputs}
            </div>
            <button class="btn btn-primary" type="submit">Start Game</button>
          </form>
        </div>
        <p class="ref">Card values: 3–10 = face value &nbsp;|&nbsp; J = 11 &nbsp;|&nbsp; Q = 12 &nbsp;|&nbsp; K = 13 &nbsp;|&nbsp; Joker = 0</p>
      `;
    }

    function renderScoring(game, error) {
      const { currentRound, players } = game;
      const roundMeta = ROUNDS[currentRound - 1];
      const errorHtml = error ? `<p class="error">${esc(error)}</p>` : '';

      const scoreInputs = players.map(p => {
        const id = `score-${esc(p).replace(/\s+/g, '-').toLowerCase()}`;
        return `
        <div class="score-input-group">
          <label for="${id}">${esc(p)}</label>
          <input type="number" id="${id}" name="${esc(p)}" min="0" required>
        </div>`;
      }).join('');

      return `
        <h1>Five Crowns</h1>
        <p class="round-info">Round ${currentRound} of 11 &nbsp;·&nbsp; ${roundMeta.cards} cards &nbsp;·&nbsp; ${roundMeta.wild} are wild</p>
        ${buildScoreTable(game)}
        <div class="score-form">
          <h2>Enter Round ${currentRound} Scores</h2>
          ${errorHtml}
          <form id="round-form">
            <div class="score-inputs">${scoreInputs}
            </div>
            <div class="actions">
              <button class="btn btn-primary" type="submit">Submit Round ${currentRound}</button>
            </div>
          </form>
        </div>
        <button class="btn btn-secondary reset-btn" style="margin-top:1rem">New Game</button>
      `;
    }

    function renderResults(game) {
      const { players } = game;
      const totals = computeTotals(game.scores, players);
      const minTotal = Math.min(...players.map(p => totals[p]));
      const winners = players.filter(p => totals[p] === minTotal);

      const winnerText = winners.length === 1
        ? `🏆 Winner: ${esc(winners[0])} with ${minTotal} points!`
        : `🏆 Tie: ${winners.map(esc).join(' & ')} with ${minTotal} points each!`;

      return `
        <h1>Five Crowns — Game Over</h1>
        <div class="winner-banner">${winnerText}</div>
        ${buildScoreTable(game)}
        <button class="btn btn-primary reset-btn" style="margin-top:1.5rem">Play Again</button>
      `;
    }

    // ── Event handlers ───────────────────────────────────────────────────────

    function handleStart(e) {
      e.preventDefault();
      const data = new FormData(e.target);
      const names = ['p1','p2','p3','p4','p5','p6','p7']
        .map(k => (data.get(k) || '').trim())
        .filter(Boolean);
      const players = [...new Set(names)];

      if (players.length < 2 || players.length > 7) {
        pendingError = 'Enter between 2 and 7 player names.';
        return render();
      }

      const scores = {};
      for (const p of players) scores[p] = [];
      writeGame({ status: 'playing', players, currentRound: 1, scores });
      pendingError = null;
      render();
    }

    function handleRound(e) {
      e.preventDefault();
      const game = readGame();
      const data = new FormData(e.target);
      const parsed = {};

      for (const p of game.players) {
        const val = parseInt(data.get(p), 10);
        if (isNaN(val) || val < 0) {
          pendingError = 'All scores must be 0 or higher.';
          return render();
        }
        parsed[p] = val;
      }

      for (const p of game.players) game.scores[p].push(parsed[p]);
      game.currentRound += 1;
      if (game.currentRound > 11) game.status = 'finished';
      writeGame(game);
      pendingError = null;
      render();
    }

    function handleReset() {
      if (!confirm('Start a new game? Current scores will be lost.')) return;
      localStorage.removeItem(STORAGE_KEY);
      pendingError = null;
      render();
    }

    // ── Render ───────────────────────────────────────────────────────────────

    function bindEvents() {
      document.getElementById('start-form')?.addEventListener('submit', handleStart);
      document.getElementById('round-form')?.addEventListener('submit', handleRound);
      document.querySelectorAll('.reset-btn').forEach(btn => btn.addEventListener('click', handleReset));
      const totalsToggle = document.getElementById('totals-toggle');
      if (totalsToggle) {
        totalsToggle.addEventListener('click', () => {
          const wrapper = document.getElementById('score-table-wrapper');
          const hidden = wrapper.classList.toggle('totals-hidden');
          totalsToggle.textContent = hidden ? 'Show totals' : 'Hide totals';
        });
      }
    }

    function render() {
      const game = readGame();
      const app = document.getElementById('app');
      const error = pendingError;

      if (!game || game.status === 'setup') {
        app.innerHTML = renderSetup(error);
      } else if (game.status === 'finished') {
        app.innerHTML = renderResults(game);
      } else {
        app.innerHTML = renderScoring(game, error);
      }

      bindEvents();
    }

    render();
  </script>
</body>
</html>
